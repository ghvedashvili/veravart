<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Chess - Masked Edition 😷</title>
<style>
:root {
  --x: 45deg;
  --y: 0deg;
  --z: -40deg;
  --tx: 0px;
  --ty: 0px;
  --tz: 0px;
  --p: 3705px;
  --s: 0.6;
}

html, body{
padding:0;
margin:0;
background-color:white;
background-image:radial-gradient(#FFF, #ccc);
font-family:"Arial", sans-serif;
font-size:10px;
width:100vw;
height:100vh;
max-width:100vw;
overflow:hidden;
display:block;
scrollbar-color:#F86F0C rgb(200,200,200);
scrollbar-width:thin;
}

.uniform{
position:absolute;left:0;top:0;
width:100vw;height:100vh;
transform:scale(var(--s,1));
display:flex;
align-items:center;
justify-content:center;
overflow:visible;
transition:transform ease 1s;
}

.noborders .object3d{top:80px;}

.object3d{
top:0px;
position:relative;
transform:perspective(var(--p, 1000px)) rotateX(var(--x, 0deg)) rotateY(var(--y, 0deg)) rotateZ(var(--z, 0deg)) translate3d(var(--tx, 0px), var(--ty, 0px), var(--tz, -12px));
--path-max-rotate:calc(360deg + var(--z, 0deg));
transform-style:preserve-3d;
margin:auto;
transition:all ease 1s;
transition-property:top, transform;
}

.noanimations .piece,
.noanimations .object3d,
.noanimations .uniform,
.noanimations.scalable .main-stage,
.noanimations.scalable .main-stage::before,
.noanimations.scalable .main-stage .side1,
.noanimations.scalable .main-stage .side2,
.noanimations.scalable .main-stage .side1::before,
.noanimations.scalable .main-stage .side2::before,
.noanimations .coordinates::before, .noanimations .coordinates::after,
.noanimations .coordinates_::before, .noanimations .coordinates_::after,
.noanimations .main-elements::after{
transition:none!important;
}

.object3d.rotate{
animation:autorotate linear 20s forwards infinite;
}

@keyframes autorotate{
100%{
transform:perspective(var(--p, 1000px)) rotateX(var(--x, 0deg)) rotateY(var(--y, 0deg)) rotateZ(var(--path-max-rotate)) translate3d(var(--tx, 0px), var(--ty, 0px), var(--tz, -12px));
}
}

.reusable-rect{
--x:0deg;
--y:0deg;
--width:300px;
--height:50px;
--length:600px;
--left:0px;
--top:0px;
--default-color:white;
--shade-template:linear-gradient(0deg, var(--shade-color), var(--shade-color));
--shadow-color:#000;
--shadow-intensity:0.14;
--shadow-filter:blur(10px);
--shadow-size:1.05;
--shadow-distance:0px;
position:relative;
width:var(--width);
height:var(--length);
background:var(--back-color,var(--default-color));
display:inline-block;
transform-origin:50% 50%;
transform-style:preserve-3d;
}

.reusable-rect, .reusable-rect div{
box-shadow:0 0 0 1px rgba(0,0,0,0);
}

.reusable-rect .sides{
position:absolute;left:0;top:0;display:block;
transform-style:preserve-3d;backface-visibility:hidden;
}

.reusable-rect:before{
transform:translateZ(var(--height));
background:var(--front-color,var(--default-color));
}

.reusable-rect .side1{
width:var(--height);height:var(--length);
transform:rotateY(-90deg);transform-origin:0% 0%;
background:var(--x-axis-left-color,var(--default-color));
}

.reusable-rect .side1::before{
background-color:var(--x-axis-right-color,var(--default-color));
background-image:var(--shade-template);
transform:translateZ(calc(var(--width) * -1));
}

.reusable-rect .side2{
width:var(--width);height:var(--height);
transform:rotateX(90deg);transform-origin:0% 0%;
background:var(--y-axis-top-color,var(--default-color));
}

.reusable-rect .side2::before{
background-color:var(--y-axis-bottom-color,var(--default-color));
background-image:var(--shade-template);
transform:translateZ(calc(var(--length) * -1));
}

.reusable-rect:before,.reusable-rect .side1::before,.reusable-rect .side2::before{
content:"";position:absolute;left:0;top:0;width:100%;height:100%;display:block;
}

.noborders .chess-defaults{
--border-size:0px;--outline-offset:0px;--outline-size:0px;
}

.noborders .coordinates::before, .noborders .coordinates::after{
color:rgba(0,0,0,0);
}

.noscroll{overflow:hidden;}

.scalable .main-stage,
.scalable .main-stage::before,
.scalable .main-stage .side1,
.scalable .main-stage .side2,
.scalable .main-stage .side1::before,
.scalable .main-stage .side2::before{
transition:all ease 0.7s;
transition-property:width, height, transform, background-color;
}

.main-stage{
--width:var(--border-template);
--height:50px;
--length:var(--border-template);
--shade-color:rgba(0,0,0,0);
--back-color:#FFDBB7;
--front-color:#FFDBB7;
--x-axis-left-color:#BF9D7A;
--x-axis-right-color:#BF9D7A;
--x-axis-right-color-2:#905438;
--y-axis-top-color:#E8C19A;
--y-axis-bottom-color:#E8C19A;
}

.main-stage::after{
content:"";position:absolute;left:50%;top:51%;width:106%;height:103%;
background:rgba(0,0,0,0.24);filter:blur(10px);
transform:translate(-50%,-50%) translateZ(-1px);
border-radius:4%;backface-visibility:hidden;
}

.main-stage .side1{
background-color:var(--front-color);
background-image:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), linear-gradient(0deg, transparent 50%, var(--front-color) 50%);
background-size:1px 1px, 200px 200px;
}

.main-elements{
position:absolute;left:50%;top:50%;
width:var(--max-area);height:var(--max-area);
transform:translate(-50%,-50%) translateZ(var(--height));
transform-style:preserve-3d;
--concat-color:#905438;
background-image:linear-gradient(45deg, var(--concat-color) calc(25% + 0.3px), transparent 25%, transparent 75%, var(--concat-color) 75%, var(--concat-color) 0),
linear-gradient(45deg, var(--concat-color) calc(25% + 0.3px), transparent 25%, transparent 75%, var(--concat-color) 75%, var(--concat-color) 0);
background-size:var(--block-set-size) var(--block-set-size);
background-position:0 0, var(--block-size) var(--block-size);
}

.main-elements::before{position:absolute;left:0;top:0;width:100%;height:100%;display:block;}

.main-elements::after{
content:"";position:absolute;left:50%;top:50%;
width:var(--outline-template);height:var(--outline-template);
border:var(--outline-size) solid #905438;border-radius:5px;
transform:translate(-50%,-50%);transition:all ease 0.4s;
transition-property:width,height,border;
box-sizing:content-box;box-shadow:0 0 0 2px rgba(0,0,0,0);
}

.stage-over{position:absolute;}

.coordinates, .coordinates_{
position:absolute;width:100%;height:var(--border-size-init);bottom:0;
}

.coordinates{left:0;transform:translateY(100%);}
.coordinates_{
right:calc(var(--border-size-init) * -1);
transform:translateX(100%) rotate(-90deg);transform-origin:0% 100%;
}

.coordinates::before, .coordinates::after,
.coordinates_::before, .coordinates_::after{
box-sizing:border-box;content:" ABCDEFGH ";
position:absolute;left:0;display:block;
letter-spacing:82px;text-indent:38px;padding-top:20px;
font-family:"Segoe UI", Arial, sans-serif;
color:#905438;font-size:30px;text-align:justify;
width:100%;height:var(--border-size);
transition:all ease 0.7s;overflow:hidden;
}

.coordinates::after{content:" HGFEDCBA ";}
.coordinates_::before, .coordinates_::after{content:" 87654321 ";letter-spacing:84px;}
.coordinates_::after{content:" 12345678 ";}
.coordinates::before, .coordinates_::before{top:0;}
.coordinates::after, .coordinates_::after{bottom:80px;transform:rotate(180deg) translateY(var(--max-area));}

.chess-defaults{
--block-size:100px;
--block-set-size:calc(var(--block-size) * 2);
--block-size-ag:100;
--outline-size:6px;
--outline-offset:8px;
--border-size:80px;
--border-size-init:80px;
--max-area:calc(var(--block-size) * 8);
--outline-template:calc(100% + var(--outline-offset) * 2);
--border-template:calc(var(--max-area) + var(--border-size) * 2);
--oct-path:polygon(50% 0%, 0 100%, 100% 100%);
--nan-path:polygon(50% 0%, 0 96%, 86% 100%);
}

.board{
position:absolute;left:0;top:0;width:100%;height:100%;
display:block;transform-style:preserve-3d;
}

.piece{
position:absolute;
left:calc(var(--block-size) * min(var(--h), 7));
bottom:calc(var(--block-size) * min(var(--v), 7));
width:var(--block-size);height:var(--block-size);
transform:rotate(0deg);transform-style:preserve-3d;
transition:background-color ease 0.5s;
--A-color:#DBA162;--B-color:#B38554;
}

.highlighted .piece{background-color:rgba(0,100,220,0.6);}

.piece > .reusable-rect{
position:absolute;left:50%;top:50%;
--back-color:#DBA162;--front-color:#DBA162;
--x-axis-left-color:#BF9D7A;--x-axis-right-color:#b38554;
--y-axis-top-color:#FEC485;--y-axis-bottom-color:#FEC485;
}

.piece.BLACK > .reusable-rect{
--back-color:#3C3C3C;--front-color:#3C3C3C;
--x-axis-left-color:#000000;--x-axis-right-color:#191B18;
--y-axis-top-color:#191B18;--y-axis-bottom-color:#000000;
}

.piece.BLACK{--A-color:#191B18;--B-color:#3C3C3C;}

.BLACK.HORSE{transform:rotate(180deg);}

.KING{
--piece-basesize:60px;--piece-upsize:50px;
--piece-thickness:24px;--piece-height:120px;--piece-head:30px;
}

.QUEEN{
--piece-basesize:60px;--piece-upsize:50px;
--piece-thickness:24px;--piece-height:110px;
}

.QUEEN .reusable-trapezoid{
position:absolute;left:50%;top:50%;
transform:translate(-50%, -50%) rotateY(180deg);
}

.QUEEN .piece-head{
position:absolute;left:50%;top:50%;
transform:translate(-50%, -50%) translateZ(calc(29px + var(--piece-height)));
transform-style:preserve-3d;
}

.QUEEN .piece-diamond, .KING .piece-diamond{
transform:translate(-50%,-50%) translateZ(calc(29px + var(--piece-height)));
--back-color:#3C3C3C;--front-color:#3C3C3C;
--x-axis-left-color:#000000;--x-axis-right-color:#191B18;
--y-axis-top-color:#191B18;--y-axis-bottom-color:#000000;
--width:10px;--length:10px;--height:10px;
}

.BLACK.QUEEN .piece-diamond, .BLACK.KING .piece-diamond{
--back-color:#DBA162;--front-color:#DBA162;
--x-axis-left-color:#BF9D7A;--x-axis-right-color:#b38554;
--y-axis-top-color:#FEC485;--y-axis-bottom-color:#FEC485;
}

.BLACK .reusable-trapezoid{
--x-color:#191B18;--y-color:#000000;--z-color:#3C3C3C;
}

.QUEEN .piece-hood{
position:absolute;left:50%;top:50%;
transform:translate(-50%, -50%) translateZ(calc(2px + var(--piece-height)));
--width:32px;--length:32px;--height:6px;
}

.KING .reusable-trapezoid{
position:absolute;left:50%;top:50%;
transform:translate(-50%, -50%) rotateY(180deg);
--traction:-13deg;--delta-boost:300%;
}

.KING .piece-head{
position:absolute;left:50%;top:50%;
transform:translate(-50%, -50%) translateZ(calc(49px + var(--piece-height)));
transform-style:preserve-3d;
}

.KING .piece-diamond{--height:40px;}

.KING .piece-hood{
position:absolute;left:50%;top:50%;
transform:translate(-50%, -50%) translateZ(calc(14px + var(--piece-height)));
--width:36px;--length:36px;--height:6px;
}

.PAWN{
--piece-basesize:56px;--piece-upsize:46px;
--piece-thickness:20px;--piece-height:30px;--piece-head:30px;
}

.HORSE{
--piece-basesize:56px;--piece-upsize:46px;
--piece-thickness:30px;--piece-height:44px;--piece-head:30px;
}

.ROOK{
--piece-basesize:56px;--piece-upsize:46px;
--piece-thickness:28px;--piece-height:60px;--piece-head:20px;
}

.BISHOP{
--piece-basesize:56px;--piece-upsize:46px;
--piece-thickness:20px;--piece-height:80px;
--piece-head:32px;--piece-crown:32px;
}

.piece-base::after{
content:"";position:absolute;left:50%;top:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);width:120%;height:120%;filter:blur(10px);
}

.piece-base{
transform:translate(-50%,-50%);
--width:var(--piece-basesize);--length:var(--piece-basesize);--height:10px;
}

.piece-upbase{
transform:translate(-50%,-50%) translateZ(10px);
--width:var(--piece-upsize);--length:var(--piece-upsize);--height:10px;
}

.piece-thick{
transform:translate(-50%,-50%) translateZ(20px);
--width:var(--piece-thickness);--length:var(--piece-thickness);--height:var(--piece-height);
}

.piece-head{
transform:translate(-50%,-50%) translateZ(calc(20px + var(--piece-height)));
--width:var(--piece-head);--length:var(--piece-head);--height:var(--piece-head);
}

.BISHOP .piece-head{
transform:translate(-50%,-50%) translateZ(calc(20px + var(--piece-height)));
--width:var(--piece-head);--length:var(--piece-head);--height:10px;
}

.ROOK .piece-head{
transform:translate(-50%,-50%) translateZ(calc(20px + var(--piece-height)));
--width:50px;--length:var(--piece-thickness);--height:var(--piece-head);
}

.ROOK .piece-head-left, .ROOK .piece-head-right, .ROOK .piece-head-center{
position:absolute;--width:10px;--length:var(--piece-thickness);--height:10px;
}

.ROOK .piece-head-left{left:0;transform:translateY(0%) translateZ(var(--piece-head));}
.ROOK .piece-head-right{left:auto;right:0;transform:translateY(0%) translateZ(var(--piece-head));}
.ROOK .piece-head-center{
--height:7px;
transform:translate(-50%,-50%) translateZ(calc(20px + var(--piece-head) + var(--piece-height)));
}

.piece-crown{
position:absolute;left:50%;top:50%;
width:var(--piece-crown);height:var(--piece-crown);
display:block;
transform:translate(-50%,-50%) translateZ(110px);
transform-origin:50% 50%;transform-style:preserve-3d;
}

.piece-crown > .ccside1{transform:rotateX(-90deg);transform-origin:50% 100%;}
.piece-crown > .ccside2{transform:rotateX(-90deg) translateZ(calc(var(--piece-crown) * -1));transform-origin:50% 100%;}
.piece-crown > .ccside3{transform:rotateX(-90deg) rotateY(90deg) translateY(-100%);transform-origin:100% 0%;}
.piece-crown > .ccside4{transform:rotateX(-90deg) rotateY(90deg) translateY(-100%) translateZ(calc(var(--piece-crown) * -1));transform-origin:100% 0%;}

.piece-crown .ccside{
height:var(--piece-crown);width:var(--piece-crown);
position:absolute;left:0;top:0;transform-style:preserve-3d;background:none;
}

.piece-crown .ccside::after{
content:"";height:var(--piece-crown);width:var(--piece-crown);
background-color:var(--A-color);position:absolute;left:0;top:0;
clip-path:polygon(50% 0, 0 100%, 100% 100%);
transform-origin:50% 100%;transform:rotateX(30deg);
}

.piece-crown .ccside:nth-child(2n)::after{
background-color:var(--B-color);transform:rotateX(-30deg);
}

.piece-tilt1{
transform:translate(-50%,-50%) translateZ(17px) rotateX(20deg);
--width:var(--piece-thickness);--length:var(--piece-thickness);--height:var(--piece-height);
}

.piece-tilt2{
transform:translate(-50%,calc(-50% - 14px)) translateZ(54px) rotateX(0deg);
--width:var(--piece-thickness);--length:var(--piece-thickness);--height:var(--piece-height);
}

.piece-tilt3{
transform:translate(-50%,calc(-50% - 42px)) translateZ(71px) rotateX(-117deg);
--width:var(--piece-thickness);--length:var(--piece-thickness);--height:var(--piece-height);
transform-origin:0% 100%;
}

.reusable-trapezoid{
--width:40px;--length:40px;--height:30px;
--traction: -20deg;--boost: 45%;--delta-boost:182%;--boost-z: -8px;
--x-color:#FEC485;--y-color:#997044;--z-color:#DBA162;
position:relative;left:0%;top:0%;
width:var(--width);height:var(--length);
background:var(--z-color);display:inline-block;
transform-origin:50% 50%;transform-style:preserve-3d;
}

.reusable-trapezoid .trapesides::after{
content:"";position:absolute;left:0;top:0;width:100%;height:100%;
background-image:linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1));
}

.trapeside2::after, .trapeside4::after{
clip-path:polygon(0% 0%, 100% 0%, 50% var(--delta-boost));
transform-origin: 50% 0%;background-color:var(--x-color);
}

.trapeside1::after, .trapeside3::after{
clip-path:polygon(0% 0%, var(--delta-boost) 50%, 0% 100%);
transform-origin:0% 50%;background-color:var(--y-color);
}

.trapeside2::after{transform: rotateX(var(--traction));}
.trapeside4::after{transform: rotateX(calc(var(--traction) * -1));}
.trapeside1::after{transform:rotateY(calc(var(--traction) * -1));}
.trapeside3::after{transform:rotateY(var(--traction));}

.trapesides.trapeside5::after{
width:var(--boost);height:var(--boost);left:50%;top:50%;
transform:translate(-50%,-50%) translateZ(var(--boost-z));
background-color:var(--z-color, var(--default-color));
}

.reusable-trapezoid .trapesides{
position:absolute;left:0;top:0;display:block;transform-style:preserve-3d;
}

.reusable-trapezoid .trapeside5{width:100%;height:100%;transform:translateZ(var(--height));}

.reusable-trapezoid .trapeside1{width:var(--height);height:var(--length);transform:rotateY(-90deg);transform-origin:0% 0%;}
.reusable-trapezoid .trapeside3{width:var(--height);height:var(--length);transform:rotateY(-90deg) translateZ(calc(var(--width) * -1));transform-origin:0% 0%;}
.reusable-trapezoid .trapeside2{width:var(--width);height:var(--height);transform:rotateX(90deg);transform-origin:0% 0%;}
.reusable-trapezoid .trapeside4{width:var(--width);height:var(--height);transform:rotateX(90deg) translateZ(calc(var(--length) * -1));transform-origin:0% 0%;}

/* ===== MEDICAL MASK ===== */
.mask-container {
  position: absolute;
  left: 50%;
  top: 50%;
  transform-style: preserve-3d;
  pointer-events: none;
}

.piece:not(.BLACK) .mask-container {
  transform:
    translate(-50%, -50%)
    translateZ(var(--mz))
    translateY(var(--mt))
    rotateX(-90deg);
}

.piece.BLACK .mask-container {
  transform:
    translate(-50%, -50%)
    translateZ(var(--mz))
    translateY(calc(var(--mt) * -1))
    rotateX(90deg);
}

.BLACK.HORSE .mask-container {
  transform:
    translate(-50%, -50%)
    translateZ(var(--mz))
    translateY(var(--mt))
    rotateX(-90deg);
}

.PAWN   .mask-container { --mz: 37px;  --mt: 12px; }
.ROOK   .mask-container { --mz: 50px;  --mt: 15px; }
.HORSE  .mask-container { --mz: 52px;  --mt: 16px; }
.BISHOP .mask-container { --mz: 60px;  --mt: 11px; }
.QUEEN  .mask-container { --mz: 75px;  --mt: 13px; }
.KING   .mask-container { --mz: 80px;  --mt: 13px; }

.mask-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  transform-style: preserve-3d;
  width: 36px;
  height: 26px;
}

.mask-svg {
  display: block;
  overflow: visible;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.strap {
  position: absolute;
  background: #1a7ab5;
  border-radius: 2px;
}

.strap-top {
  width: var(--strap-len, 26px);
  height: 3px;
  top: 6px;
  left: -1px;
  transform-origin: 0% 50%;
  transform: rotateY(90deg);
  background: linear-gradient(90deg, #1a7ab5, #0d5a8a);
}

.strap-bot {
  width: var(--strap-len, 26px);
  height: 3px;
  bottom: 6px;
  left: -1px;
  transform-origin: 0% 50%;
  transform: rotateY(90deg);
  background: linear-gradient(90deg, #1a7ab5, #0d5a8a);
}

.PAWN   .strap { --strap-len: 22px; }
.ROOK   .strap { --strap-len: 30px; }
.HORSE  .strap { --strap-len: 32px; }
.BISHOP .strap { --strap-len: 22px; }
.QUEEN  .strap { --strap-len: 26px; }
.KING   .strap { --strap-len: 26px; }

.strap-knot {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #0d5a8a;
  border: 1.5px solid #5ab5e0;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) translateZ(calc(var(--strap-len, 26px) * -1));
}

.PAWN   .strap-knot { transform: translate(-50%, -50%) translateZ(-22px); }
.ROOK   .strap-knot { transform: translate(-50%, -50%) translateZ(-30px); }
.HORSE  .strap-knot { transform: translate(-50%, -50%) translateZ(-32px); }
.BISHOP .strap-knot { transform: translate(-50%, -50%) translateZ(-22px); }
.QUEEN  .strap-knot { transform: translate(-50%, -50%) translateZ(-26px); }
.KING   .strap-knot { transform: translate(-50%, -50%) translateZ(-26px); }

/* ===== FALLEN PIECES — outside board, flat on surface ===== */
.piece-fallen {
  position: absolute;
  width: var(--block-size);
  height: var(--block-size);
  transform-style: preserve-3d;
  --A-color:#DBA162;--B-color:#B38554;
}
.piece-fallen > .reusable-rect {
  position: absolute; left: 50%; top: 50%;

<script>
// ===== INIT =====
window.addEventListener('load', function(){
  var vw = window.innerWidth;
  var root = document.documentElement;
  if(vw < 1024){
    var vh = window.innerHeight;
    // board is 960px wide at scale=1, but 3D perspective makes it appear wider
    // use min of width/height fit, leave 10% padding
    var autoScale = Math.min((vw * 0.78) / 960, (vh * 0.72) / 960, 0.55);
    root.style.setProperty('--s', autoScale.toFixed(3));
    root.style.setProperty('--p', Math.round(3705 * autoScale / 0.6) + 'px');
  }
  setTimeout(function(){ root.classList.add('scalable'); }, 1000);
});

// ===== ZOOM (wheel + pinch) =====
(function(){
  var currentScale = null;

  function getScale(){
    if(currentScale === null){
      var cs = getComputedStyle(document.documentElement).getPropertyValue('--s');
      currentScale = parseFloat(cs) || 0.6;
    }
    return currentScale;
  }

  function setScale(s){
    s = Math.max(0.1, Math.min(3.0, s));
    currentScale = s;
    document.documentElement.style.setProperty('--s', s);
  }

  document.addEventListener('wheel', function(e){
    e.preventDefault();
    var delta = e.deltaY > 0 ? -0.05 : 0.05;
    setScale(getScale() + delta);
  }, {passive: false});

  var lastPinchDist = null;

  function getPinchDist(touches){
    var dx = touches[0].clientX - touches[1].clientX;
    var dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }

  document.addEventListener('touchstart', function(e){
    if(e.touches.length === 2) lastPinchDist = getPinchDist(e.touches);
  }, {passive: true});

  document.addEventListener('touchmove', function(e){
    if(e.touches.length === 2 && lastPinchDist !== null){
      var dist = getPinchDist(e.touches);
      setScale(getScale() * (dist / lastPinchDist));
      lastPinchDist = dist;
    }
  }, {passive: true});

  document.addEventListener('touchend', function(e){
    if(e.touches.length < 2) lastPinchDist = null;
  }, {passive: true});
})();

// ===== DRAG ROTATION (mouse + touch) =====
(function(){
  var rotX = 45;
  var rotZ = -40;
  var dragging = false;
  var lastX = 0, lastY = 0;
  var sensitivity = 0.5;

  function setRotation(){
    document.documentElement.style.setProperty('--x', rotX + 'deg');
    document.documentElement.style.setProperty('--z', rotZ + 'deg');
  }

  function onStart(x, y){
    dragging = true;
    lastX = x;
    lastY = y;
    document.documentElement.classList.add('noanimations');
  }

  function onMove(x, y){
    if(!dragging) return;
    var dx = x - lastX;
    lastX = x;
    lastY = y;
    rotZ -= dx * sensitivity;
    setRotation();
  }

  function onEnd(){
    dragging = false;
    document.documentElement.classList.remove('noanimations');
  }

  document.addEventListener('mousedown', function(e){ onStart(e.clientX, e.clientY); });
  document.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('mouseleave', onEnd);

  document.addEventListener('touchstart', function(e){
    if(e.touches.length !== 1) { onEnd(); return; }
    onStart(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: true});

  document.addEventListener('touchmove', function(e){
    if(e.touches.length !== 1) { onEnd(); return; }
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: true});

  document.addEventListener('touchend', onEnd);
  document.addEventListener('touchcancel', onEnd);
})();
</script>
