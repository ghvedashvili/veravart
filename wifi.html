<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Vodafone WiFi Scene</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden;}
body{
  background:radial-gradient(ellipse at 30% 0%, #2a1f0e 0%, #0e0b07 60%, #050403 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;overflow:hidden;position:relative;
}

body::before{
  content:'';position:fixed;top:0;left:0;right:0;height:50%;
  background:radial-gradient(ellipse at 50% -20%,rgba(255,220,120,0.08) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
.scene{
  display:flex;align-items:flex-end;justify-content:center;
  gap:clamp(40px,6vw,80px);
  padding:20px clamp(10px,4vw,40px) clamp(30px,8vw,100px);
  position:relative;z-index:1;flex-wrap:wrap;
}
/* ROUTER THUMBNAIL */
.router-scene{flex-shrink:0;cursor:pointer;filter:drop-shadow(0 28px 32px rgba(0,0,0,0.75));}
.router-thumb{
  width:clamp(180px,28vw,340px);
  border-radius:clamp(8px,1.5vw,12px);
  border:2px solid rgba(230,0,0,0.35);
  box-shadow:0 0 0 1px rgba(255,255,255,0.07),0 8px 30px rgba(0,0,0,0.6),0 0 20px rgba(230,0,0,0.1);
  transition:transform 0.25s ease,box-shadow 0.25s ease,border-color 0.25s;display:block;
}
.router-thumb:hover{
  transform:scale(1.04) translateY(-4px);
  box-shadow:0 0 0 1px rgba(255,255,255,0.15),0 16px 50px rgba(0,0,0,0.7),0 0 35px rgba(230,0,0,0.3);
  border-color:rgba(230,0,0,0.75);
}
.zoom-hint{text-align:center;font-size:clamp(7px,1.1vw,9px);color:rgba(200,200,200,0.35);letter-spacing:2px;margin-top:8px;animation:hintPulse 3s ease infinite;}
@keyframes hintPulse{0%,100%{opacity:0.2}50%{opacity:0.8}}
/* LIGHTBOX */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.35s ease;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox-img{
  max-width:90vw;max-height:88vh;
  border-radius:clamp(8px,1.5vw,14px);
  border:2px solid rgba(230,0,0,0.45);
  box-shadow:0 0 60px rgba(230,0,0,0.2),0 30px 80px rgba(0,0,0,0.8);
  transform:scale(0.88);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.lightbox.open .lightbox-img{transform:scale(1);}
.lightbox-close{
  position:fixed;top:clamp(14px,3vw,28px);right:clamp(14px,3vw,28px);
  width:clamp(36px,5vw,48px);height:clamp(36px,5vw,48px);border-radius:50%;
  background:rgba(230,0,0,0.12);border:1.5px solid rgba(230,0,0,0.45);
  color:#fff;font-size:clamp(16px,2.5vw,22px);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.2s,transform 0.2s;backdrop-filter:blur(6px);
}
.lightbox-close:hover{background:rgba(230,0,0,0.4);transform:scale(1.1) rotate(90deg);}
/* iPHONE — Danny Ocean style iPhone X frame */
.phone-scene{flex-shrink:0;filter:drop-shadow(0 40px 35px rgba(0,0,0,0.75));}
.iphone{
  width:220px;
  height:446px;
  position:relative;
  border-radius:40px;
  background:linear-gradient(145deg,#2a2a2c 0%,#1a1a1c 40%,#111112 100%);
  padding:10px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    inset 0 0 0 1px rgba(255,255,255,0.04),
    0 20px 60px rgba(0,0,0,0.8),
    0 40px 100px rgba(0,0,0,0.5);
}
/* left buttons (volume up, volume down) */
.iphone::before{
  content:'';position:absolute;
  left:-4px;top:90px;
  width:4px;height:110px;
  background:linear-gradient(180deg,#2a2a2c 0%,#3a3a3c 20%,#1e1e20 50%,#3a3a3c 80%,#2a2a2c 100%);
  border-radius:3px 0 0 3px;
  box-shadow:-1px 0 3px rgba(0,0,0,0.5);
}
/* right button (power) */
.iphone::after{
  content:'';position:absolute;
  right:-4px;top:120px;
  width:4px;height:60px;
  background:linear-gradient(180deg,#2a2a2c,#3a3a3c,#1e1e20,#3a3a3c,#2a2a2c);
  border-radius:0 3px 3px 0;
  box-shadow:1px 0 3px rgba(0,0,0,0.5);
}
.iphone-screen{
  width:100%;height:100%;
  border-radius:32px;
  overflow:hidden;
  background:#000;
  position:relative;
}
/* notch */
.iphone-notch{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:150px;height:28px;
  background:#000;
  border-radius:0 0 20px 20px;
  z-index:60;
}
.iphone-screen::before{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.01) 50%,transparent 100%);
  border-radius:inherit;pointer-events:none;z-index:100;
}
.phone-wallpaper{position:absolute;inset:0;background:url('https://media.idownloadblog.com/wp-content/uploads/2017/11/iOS-stock-6-for-iPhone-X-768x1663.png') center/cover no-repeat;}
.status-bar{position:absolute;top:30px;left:0;right:0;padding:0 18px;display:flex;justify-content:space-between;align-items:center;z-index:20;}
.sb-time{font-size:14px;font-weight:600;color:#fff;letter-spacing:0.5px}
.sb-icons{display:flex;align-items:center;gap:4px}
.sig-bars{display:flex;align-items:flex-end;gap:1px}
.sig-bar{width:3px;background:#fff;border-radius:1px;opacity:0.9}
.sig-bar:nth-child(1){height:4px}.sig-bar:nth-child(2){height:6px}.sig-bar:nth-child(3){height:8px}.sig-bar:nth-child(4){height:10px}.sig-bar.dim{opacity:0.3}
.battery-icon{display:flex;align-items:center;gap:1px}
.batt-body{width:22px;height:12px;border:1.5px solid rgba(255,255,255,0.7);border-radius:2px;padding:1.5px;}
.batt-fill{width:75%;height:100%;background:#4cd964;border-radius:1px}
.batt-tip{width:2px;height:5px;background:rgba(255,255,255,0.5);border-radius:0 1px 1px 0}
.phone-content{position:absolute;top:65px;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:12px 14px 12px;gap:10px;z-index:10;}
.wifi-big{display:flex;flex-direction:column;align-items:center;gap:1px;margin-bottom:3px}
.wb-arc{border:2px solid #4fc3f7;border-bottom:none;border-left:none;border-right:none;border-radius:50% 50% 0 0/100% 100% 0 0;opacity:0;animation:wbArc 2s ease infinite;}
.wb-arc:nth-child(1){width:12px;height:7px;animation-delay:0s}
.wb-arc:nth-child(2){width:22px;height:12px;animation-delay:0.3s}
.wb-arc:nth-child(3){width:34px;height:18px;animation-delay:0.6s}
.wb-dot{width:6px;height:6px;border-radius:50%;background:#4fc3f7;box-shadow:0 0 8px #4fc3f7;margin-top:2px}
@keyframes wbArc{0%{opacity:0;transform:scale(0.8)}40%{opacity:1}100%{opacity:0;transform:scale(1.05)}}
.wifi-network-name{font-size:12px;font-weight:bold;color:#fff;text-align:center;letter-spacing:1px}
.wifi-subtitle{font-size:9px;color:rgba(255,255,255,0.5);text-align:center;letter-spacing:1px}
.pw-card{width:100%;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
.pw-card-title{font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:1.5px;text-transform:uppercase;text-align:center}
.pw-input-wrap{position:relative}
.pw-input{width:100%;background:rgba(0,0,0,0.35);border:1.5px solid rgba(255,255,255,0.18);border-radius:10px;padding:9px 36px 9px 12px;font-family:'Share Tech Mono',monospace;font-size:13px;color:#fff;outline:none;letter-spacing:3px;transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;caret-color:#4fc3f7;}
.pw-input::placeholder{color:rgba(255,255,255,0.25);letter-spacing:1px;font-size:10px}
.pw-input:focus{border-color:#4fc3f7;background:rgba(0,0,0,0.5);box-shadow:0 0 0 3px rgba(79,195,247,0.15)}
.pw-input.err{border-color:#ef5350;box-shadow:0 0 0 3px rgba(239,83,80,0.15);animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:14px;opacity:0.5;transition:opacity 0.2s;user-select:none;}
.pw-eye:hover{opacity:0.9}
.pw-btn{width:100%;background:linear-gradient(135deg,#4fc3f7,#0288d1);color:#fff;border:none;border-radius:10px;padding:10px;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:bold;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all 0.2s;box-shadow:0 4px 15px rgba(2,136,209,0.4);}
.pw-btn:hover{background:linear-gradient(135deg,#81d4fa,#0288d1);transform:translateY(-1px);box-shadow:0 6px 20px rgba(2,136,209,0.5)}
.pw-btn:active{transform:translateY(0)}
.pw-status{min-height:13px;text-align:center;font-size:9px;letter-spacing:1px;transition:color 0.3s}
.pw-status.err{color:#ef5350}.pw-status.ok{color:#66bb6a}.pw-status.chk{color:#4fc3f7;animation:chkPulse 0.7s infinite}
@keyframes chkPulse{0%,100%{opacity:1}50%{opacity:0.3}}
.home-indicator{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:35%;height:4px;background:rgba(255,255,255,0.35);border-radius:3px;}
.connected-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#1a4a2a 0%,#0a2015 100%);border-radius:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;opacity:0;pointer-events:none;transition:opacity 0.6s;z-index:30;padding:20px;}
.connected-overlay.show{opacity:1;pointer-events:all}
.conn-check{font-size:42px;animation:checkPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes checkPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.conn-title{color:#fff;font-size:15px;font-weight:bold;text-align:center;letter-spacing:1px}
.conn-ssid{color:#66bb6a;font-size:13px;letter-spacing:2px}
.conn-speed{color:rgba(255,255,255,0.6);font-size:10px;letter-spacing:1px}
.conn-bars{display:flex;align-items:flex-end;gap:3px}
.conn-bar{width:8px;background:#66bb6a;border-radius:2px;box-shadow:0 0 8px #66bb6a88}
.conn-bar:nth-child(1){height:8px;animation:barGrow 0.4s 0.3s both}
.conn-bar:nth-child(2){height:14px;animation:barGrow 0.4s 0.5s both}
.conn-bar:nth-child(3){height:20px;animation:barGrow 0.4s 0.7s both}
.conn-bar:nth-child(4){height:26px;animation:barGrow 0.4s 0.9s both}
@keyframes barGrow{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
</style>
</head>
<body>
<div class="scene">

  

  <div class="phone-scene">
    <div class="iphone">
      <div class="iphone-screen">
        <div class="phone-wallpaper"></div>
        <div class="iphone-notch"></div>
        <div class="status-bar">
          <div class="sb-time" id="sbTime">9:41</div>
          <div class="sb-icons">
            <div class="sig-bars">
              <div class="sig-bar"></div><div class="sig-bar"></div>
              <div class="sig-bar"></div><div class="sig-bar dim"></div>
            </div>
            <div style="font-size:clamp(9px,1.6vw,12px);color:#fff">5G</div>
            <div class="battery-icon">
              <div class="batt-body"><div class="batt-fill"></div></div>
              <div class="batt-tip"></div>
            </div>
          </div>

        <div class="phone-content">

            <div class="wb-arc"></div><div class="wb-arc"></div><div class="wb-arc"></div>

            <div class="pw-card-title">Enter Password</div>
            <div class="pw-input-wrap">
              <input class="pw-input" id="pwInput" type="password" placeholder="Wi-Fi Password" maxlength="32" autocomplete="off"/>
              <span class="pw-eye" id="pwEye" onclick="toggleEye()">👁</span>
            </div>
            <button class="pw-btn" onclick="connect()">Join Network</button>
            <div class="pw-status" id="pwStatus"></div>
          </div>
        </div>
        <div class="connected-overlay" id="connOverlay">
          <div class="conn-check">✅</div>
          <div class="conn-title">Connected!</div>
          <div class="conn-ssid">VodafoneMobileWiFi</div>
          <div class="conn-bars">
            <div class="conn-bar"></div><div class="conn-bar"></div>
            <div class="conn-bar"></div><div class="conn-bar"></div>
          </div>
          <div class="conn-speed" id="connSpeed"></div>
        </div>
        <div class="home-indicator"></div>
      </div>
    </div>

<script>
const PWD='emergencynotfound';
let eyeOpen=false;
function updateClock(){const now=new Date();const h=String(now.getHours()).padStart(2,'0');const m=String(now.getMinutes()).padStart(2,'0');document.getElementById('sbTime').textContent=h+':'+m;}
updateClock();setInterval(updateClock,10000);
function openLightbox(){document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});
function toggleEye(){eyeOpen=!eyeOpen;document.getElementById('pwInput').type=eyeOpen?'text':'password';document.getElementById('pwEye').textContent=eyeOpen?'🙈':'👁';}
function connect(){
  const val=document.getElementById('pwInput').value;
  const status=document.getElementById('pwStatus');
  const input=document.getElementById('pwInput');
  if(!val){status.className='pw-status err';status.textContent='⚠ Enter password';return}
  status.className='pw-status chk';status.textContent='Connecting...';
  setTimeout(()=>{
    if(val===PWD){
      status.className='pw-status ok';status.textContent='✓ Authenticated';
      setTimeout(()=>{document.getElementById('connOverlay').classList.add('show');const s=['↓ 58 Mbps · ↑ 21 Mbps','↓ 42 Mbps · ↑ 18 Mbps','↓ 72 Mbps · ↑ 26 Mbps'];document.getElementById('connSpeed').textContent=s[Math.floor(Math.random()*s.length)];},500);
    } else {
      status.className='pw-status err';status.textContent='✗ Incorrect password';
      input.classList.add('err');setTimeout(()=>input.classList.remove('err'),500);input.value='';
    }
  },1200);
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')connect()});
document.getElementById('pwInput').addEventListener('focus',()=>{setTimeout(()=>{window.scrollTo(0,0);document.body.scrollTop=0;},100);});
document.getElementById('pwInput').addEventListener('blur',()=>{window.scrollTo(0,0);document.body.scrollTop=0;});
</script>
