<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Ticket</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 16px;
      font-family: 'Oswald', sans-serif;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(255,60,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(0,80,200,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .label {
      color: rgba(255,255,255,0.35);
      font-size: clamp(10px, 1.5vw, 13px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }
    .ticket-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: center;
    }
    .ticket-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 8px 40px rgba(0,0,0,0.7), 0 2px 8px rgba(255,60,0,0.15);
      cursor: zoom-in;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease;
      transform-origin: center top;
      will-change: transform;
    }
    .ticket-img:hover {
      transform: scale(1.025);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 60px rgba(0,0,0,0.8), 0 4px 20px rgba(255,60,0,0.3);
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      cursor: zoom-out;
      padding: 20px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .overlay.active { opacity: 1; pointer-events: all; }
    .overlay-img {
      max-width: min(95vw, 1200px);
      max-height: 90vh;
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 40px 100px rgba(0,0,0,0.9), 0 0 60px rgba(255,60,0,0.12);
      transform: scale(0.88);
      transition: transform 0.4s cubic-bezier(0.34,1.36,0.64,1);
      display: block;
    }
    .overlay.active .overlay-img { transform: scale(1); }
    .close-hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .overlay.active ~ .close-hint { opacity: 1; }
    .hint {
      margin-top: 14px;
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    @media (max-width: 480px) { body { padding: 24px 12px; } }
  </style>
</head>
