<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Ticket</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Oswald', sans-serif;
      background: #0a1a0a;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .pitch {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .pitch::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        #1a4a1a 0px,
        #1a4a1a 60px,
        #1d521d 60px,
        #1d521d 120px
      );
    }

    .pitch-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }

    .pitch::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.65) 100%);
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(16px, 3vw, 36px) clamp(12px, 3vw, 32px) 0;
      gap: clamp(8px, 1.2vh, 14px);
    }

    .top-label {
      color: rgba(255,255,255,0.55);
      font-size: clamp(9px, 1.2vw, 13px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .ticket-wrap {
      width: 100%;
      max-width: min(860px, 94vw);
    }

    .ticket-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: clamp(6px, 1vw, 12px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 8px 32px rgba(0,0,0,0.7),
        0 0 60px rgba(255,80,20,0.2);
      cursor: zoom-in;
      transition: transform 0.4s cubic-bezier(0.34,1.5,0.64,1), box-shadow 0.35s ease;
    }

    .ticket-img:hover {
      transform: scale(1.018) translateY(-3px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.12),
        0 20px 60px rgba(0,0,0,0.8),
        0 0 80px rgba(255,80,20,0.3);
    }

    .hint {
      color: rgba(255,255,255,0.28);
      font-size: clamp(9px, 1vw, 11px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 6px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.93);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      cursor: zoom-out;
      padding: 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .overlay.active { opacity: 1; pointer-events: all; }
    .overlay-img {
      max-width: min(95vw, 1200px);
      max-height: 90vh;
      width: auto; height: auto;
      border-radius: 12px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 80px rgba(255,80,20,0.15);
      transform: scale(0.87);
      transition: transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
      display: block;
    }
    .overlay.active .overlay-img { transform: scale(1); }

    .esc-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      pointer-events: none; z-index: 1001;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .overlay.active ~ .esc-hint { opacity: 1; }
  </style>
</head>
